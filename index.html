    // --- Audio Helper Functions for Gemini TTS ---
    const base64ToArrayBuffer = (base64) => {
      const binaryString = window.atob(base64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes.buffer;
    };

    const createWavFile = (pcmData, sampleRate = 24000) => {
      const numChannels = 1;
      const bitsPerSample = 16;
      const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
      const blockAlign = numChannels * (bitsPerSample / 8);
      const dataSize = pcmData.byteLength;
      const chunkSize = 36 + dataSize;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      const writeString = (view, offset, string) => {
        for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); }
      };

      writeString(view, 0, 'RIFF');
      view.setUint32(4, chunkSize, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // PCM format
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);
      writeString(view, 36, 'data');
      view.setUint32(40, dataSize, true);

      new Uint8Array(buffer, 44).set(new Uint8Array(pcmData));
      return new Blob([buffer], { type: 'audio/wav' });
    };

    // --- Data Models & Interpolation ---
    const interpolate = (week, keyframes) => {
      if (!keyframes || keyframes.length === 0) return 0;
      for (let i = 0; i < keyframes.length - 1; i++) {
        if (week >= keyframes[i].w && week <= keyframes[i + 1].w) {
          const rangeW = keyframes[i + 1].w - keyframes[i].w;
          const rangeV = keyframes[i + 1].v - keyframes[i].v;
          const t = (week - keyframes[i].w) / rangeW;
          return keyframes[i].v + rangeV * t;
        }
      }
      if (week < keyframes[0].w) return keyframes[0].v;
      if (week > keyframes[keyframes.length - 1].w) return keyframes[keyframes.length - 1].v;

      const [isGenerating, setIsGenerating] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      
      // Q&A States
      const [customQuestion, setCustomQuestion] = useState("");
      const [customAnswer, setCustomAnswer] = useState(null);
      const [isAsking, setIsAsking] = useState(false);

      const activeScenario = SCENARIOS[scenarioId];
      const mode = activeScenario.mode;
      const maxW = activeScenario.maxWeeks || 52;

      const apiKey = ""; // Add your Gemini API Key here if needed

      // Re-trigger visual changes and clear AI states on scrub
      const handleWeekChange = (val) => {
        setWeek(val);
        setIsPlaying(false);
        setReport(null);
        setCustomAnswer(null);
        
        // Cancel Auto-Narrate if manually disrupted
        setIsAutoNarrating(false);
        autoNarrateRef.current = false;

        setIsSpeaking(false);
      };

      const generateReport = async (targetWeek = week, isTour = false) => {
        setIsGenerating(true);
        setReport(null);
        setIsSpeaking(false);
        
        const currentSystems = activeScenario.systems;
        const systemData = currentSystems.map(s => `${s.name}: ${Math.round(interpolate(targetWeek, s.keyframes))}%`).join(', ');
        
        const prompt = mode === 'decomposition'
          ? `Act as an expert forensic anthropologist narrating a documentary. Describe the current state of the body at exactly week ${targetWeek} in a ${activeScenario.title} scenario. Current stats: ${systemData}. Keep it engaging, scientific, and strictly under 60 words. No markdown hashes.`
          : `Act as a clinical physiologist narrating a documentary. Describe the patient's physiological state at exactly week ${targetWeek} in a ${activeScenario.title} scenario. Current stats: ${systemData}. Keep it engaging, scientific, and strictly under 60 words. No markdown hashes.`;

        try {
          let attempt = 0;
          let response;
          while (attempt < 5) {
            response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (response.ok) break;
            attempt++;
            const delay = Math.pow(2, attempt) * 1000;
            await new Promise(r => setTimeout(r, delay));
          }
          
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json();
          if (data.error) throw new Error(data.error.message);
          
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          const finalReport = text || "No report generated.";
          setReport(finalReport);
          setIsGenerating(false);

          if (isTour && autoNarrateRef.current) {
             await narrateReport(finalReport, targetWeek, true);
          }

        } catch (error) {
          console.error("Gemini API Error:", error);
          setReport("Error generating report. Please check your API key/connection.");
          setIsGenerating(false);
          if (isTour && autoNarrateRef.current) setIsPlaying(true);
        }
      };

      const narrateReport = async (textToSpeak = report, targetWeek = week, autoResume = false) => {
        if(!textToSpeak) return;
        setIsSpeaking(true);
        try {
          let attempt = 0;
          let response;
          while (attempt < 5) {
              response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Entering Week ${targetWeek}. ` + textToSpeak }] }],
                  generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                  }
                })
              });
              if (response.ok) break;
              attempt++;
              const delay = Math.pow(2, attempt) * 1000;
              await new Promise(r => setTimeout(r, delay));
          }
          
          if (!response.ok) {
             throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          const base64Pcm = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
          
          if (!base64Pcm) throw new Error("No audio data returned");
          const pcmBuffer = base64ToArrayBuffer(base64Pcm);
          const wavBlob = createWavFile(pcmBuffer, 24000);
          const audioUrl = URL.createObjectURL(wavBlob);
          
          const audio = new Audio(audioUrl);
          audio.onended = () => {
            setIsSpeaking(false);
            if (autoResume && autoNarrateRef.current) {
              setIsPlaying(true);
            }
          };
          audio.play();
        } catch (err) {
          console.error("TTS Error:", err);
          setIsSpeaking(false);
          if (autoResume && autoNarrateRef.current) setIsPlaying(true);
        }
      };

      const toggleGuidedTour = () => {
        const nextState = !isAutoNarrating;
        setIsAutoNarrating(nextState);
        autoNarrateRef.current = nextState;
        
        if (nextState) {
          lastNarratedPhase.current = null; // force immediate trigger
          setIsPlaying(true);
        } else {
          setIsSpeaking(false);
          setIsPlaying(false);
        }
      };

      const handleAskExpert = async () => {
        if(!customQuestion.trim()) return;
        setIsAsking(true);
        setCustomAnswer(null);
        
        const currentSystems = activeScenario.systems;
        const systemData = currentSystems.map(s => `${s.name}: ${Math.round(interpolate(week, s.keyframes))}%`).join(', ');

        const prompt = `You are an expert ${mode === 'decomposition' ? 'forensic anthropologist' : 'clinical physiologist'}. The scenario is: ${activeScenario.title} (${activeScenario.desc}). We are exactly at Week ${week}. The current physical stats are: ${systemData}. The user asks: "${customQuestion}". Provide a brief, scientific, educational answer in 2-3 sentences.`;

        try {
          let attempt = 0;
          let response;
          while (attempt < 5) {
            response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (response.ok) break;
            attempt++;
            const delay = Math.pow(2, attempt) * 1000;
            await new Promise(r => setTimeout(r, delay));
          }

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          setCustomAnswer(data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.");
        } catch (e) {
          setCustomAnswer("Error fetching answer. Check your API key/connection.");
        } finally {
          setIsAsking(false);
          setCustomQuestion("");
        }
      };

      // Handle standard playback interval
      useEffect(() => {
        let interval;
        if (isPlaying && hasStarted) {
          interval = setInterval(() => {
            setWeek(prev => {
              if (prev >= maxW) { 
                setIsPlaying(false);
                setIsAutoNarrating(false);
                autoNarrateRef.current = false;
                return maxW; 
              }
              return prev + 1;
            });
          }, 400 / speed); 
        }
        return () => clearInterval(interval);
      }, [isPlaying, speed, hasStarted, maxW]);

      // Guided Tour Effect: Detect Phase Changes and trigger generation
      useEffect(() => {
        if (!isAutoNarrating || !hasStarted) return;
        
        const currentPhase = activeScenario.text(week).phase;
        
        if (currentPhase !== lastNarratedPhase.current) {
            lastNarratedPhase.current = currentPhase;
            // Pause playback, generate new report, read it, and resume
            setIsPlaying(false); 
            generateReport(week, true);
        }
      }, [week, isAutoNarrating, hasStarted, activeScenario]);

      if (!hasStarted) {
        return (
          <div className="min-h-screen font-sans flex flex-col items-center justify-center p-4 sm:p-8 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-[500px] h-[500px] bg-cyan-500/10 blur-[100px] rounded-full pointer-events-none"></div>
            <div className="absolute bottom-0 right-0 w-[500px] h-[500px] bg-blue-500/10 blur-[100px] rounded-full pointer-events-none"></div>

            <header className="max-w-5xl w-full flex flex-col items-center mb-12 z-10">
              <h1 className="text-4xl sm:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-600 text-center mb-6 tracking-tight">
                Simulation Scenario
              </h1>
              <p className="text-slate-400 text-center max-w-2xl text-lg">
                Choose an environmental condition or starting health profile to visualize its dramatic impact on the timeline.
              </p>
            </header>

            <div className="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 z-10">
              {Object.values(SCENARIOS).map(scen => (
                <button 
                  key={scen.id}
                  onClick={() => { 
                    setScenarioId(scen.id); setHasStarted(true); setWeek(1); 
                    setIsPlaying(false); setIsAutoNarrating(false); autoNarrateRef.current = false;
                    setReport(null); setCustomAnswer(null); lastNarratedPhase.current = null;
                  }}
                  className="flex flex-col text-left bg-slate-900/80 backdrop-blur-sm border border-slate-800 rounded-2xl p-6 hover:border-cyan-500/50 hover:bg-slate-800/80 hover:-translate-y-1 transition-all duration-300 group shadow-xl"
                >
                  <div className={`p-3 rounded-xl bg-slate-950 border border-slate-800 mb-4 group-hover:scale-110 transition-transform duration-300 w-fit shadow-inner`}>
                    <scen.icon className={`w-6 h-6 ${scen.colorClass}`} />
                  </div>
                  <h3 className="text-xl font-bold text-slate-100 mb-2">{scen.title}</h3>
                  <p className="text-sm text-slate-400 leading-relaxed mb-6 flex-grow">{scen.desc}</p>
                  <div className={`text-[11px] font-bold uppercase tracking-wider ${scen.colorClass} flex items-center gap-1 mt-auto`}>
                    {scen.mode === 'decomposition' ? 'Post-Mortem Decay' : 'Sedentary Detraining'}
                    <ChevronRight className="w-4 h-4" />
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      }

      const info = activeScenario.text(week);
      const radius = 24;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (week / maxW) * circumference;

      return (
        <div className="min-h-screen font-sans flex flex-col items-center p-4 sm:p-8">
          <header className="max-w-5xl w-full flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
            <button 
              onClick={() => { setHasStarted(false); setIsPlaying(false); setIsAutoNarrating(false); autoNarrateRef.current = false; }}
              className="flex items-center gap-2 text-slate-400 hover:text-cyan-400 transition-colors mr-auto bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 shadow-sm"
            >
              <ArrowLeft className="w-4 h-4" />
              <span className="font-semibold text-xs uppercase tracking-wider">Change Scenario</span>
            </button>
            <div className="flex-1 flex justify-center">
              <h1 className="text-2xl sm:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-600 tracking-tight text-center">
                {activeScenario.title}
              </h1>
            </div>
            <div className="w-[140px] hidden sm:block"></div>
          </header>

          <main className="max-w-5xl w-full grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            <div className="md:col-span-6 flex flex-col bg-slate-900/50 p-6 rounded-2xl border border-slate-800/80 shadow-2xl relative">
              <div className="relative mb-6">
                <BodyVisualizer scenarioId={scenarioId} week={week} />
                <div className="absolute top-4 left-4 flex justify-center items-center w-16 h-16 bg-slate-950/80 rounded-full border border-slate-800 backdrop-blur-sm shadow-lg">
                  <svg className="transform -rotate-90 w-full h-full p-1" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r={radius} className="stroke-slate-800" strokeWidth="4" fill="none" />
                    <circle cx="30" cy="30" r={radius} className="stroke-cyan-500 transition-all duration-300 ease-out" strokeWidth="4" fill="none" strokeLinecap="round" style={{ strokeDasharray: circumference, strokeDashoffset }} />
                  </svg>
                  <div className="absolute inset-0 flex flex-col items-center justify-center pt-0.5">
                    <span className="text-[10px] font-semibold text-slate-400 uppercase leading-none mb-0.5">Wk</span>
                    <span className={`font-black text-slate-100 leading-none ${maxW > 999 ? 'text-sm' : 'text-xl'}`}>{week}</span>
                  </div>
                </div>
              </div>

              <div className="text-center mb-6 h-10 flex flex-col justify-center">
                <h2 className="text-xl font-bold text-cyan-400 tracking-wide">{info.phase}</h2>
              </div>

              <div className="w-full space-y-6 z-10 px-2">
                <input
                  type="range" min="1" max={maxW} value={week}
                  onChange={(e) => handleWeekChange(parseInt(e.target.value))}
                  className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-cyan-500/50 [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:bg-cyan-400 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:shadow-[0_0_10px_rgba(34,211,238,0.5)]"
                />
                
                <div className="flex justify-center gap-4">
                  <button onClick={() => { setIsPlaying(!isPlaying); setIsAutoNarrating(false); autoNarrateRef.current = false; }} className="flex items-center justify-center w-12 h-12 bg-cyan-500/10 text-cyan-400 hover:bg-cyan-500/20 hover:scale-105 transition-all rounded-full border border-cyan-500/30">
                    {isPlaying ? <Pause className="w-5 h-5" fill="currentColor" /> : <Play className="w-5 h-5 ml-1" fill="currentColor" />}
                  </button>
                  <button onClick={() => handleWeekChange(1)} className="flex items-center justify-center w-12 h-12 bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200 transition-all rounded-full border border-slate-700">
                    <RotateCcw className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="flex justify-center mt-3">
                  <div className="flex bg-slate-900/80 p-1 rounded-lg border border-slate-700/80 shadow-inner">
                    {[0.25, 0.5, 1, 2, 4, 10].map((s) => (
                      <button key={s} onClick={() => setSpeed(s)} className={`px-2 sm:px-3 py-1.5 text-[10px] sm:text-xs font-bold rounded-md transition-all ${speed === s ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 shadow-sm' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800 border border-transparent'}`}>
                        {s}x
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="md:col-span-6 flex flex-col gap-4">
              
              {/* LLM Tools Section */}
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl">
                <div className="flex items-center gap-2 mb-4">
                  <ActivitySquare className="w-5 h-5 text-cyan-400" />
                  <h3 className="font-semibold text-slate-200">Physiological Overview</h3>
                </div>
                <p className="text-slate-400 leading-relaxed text-sm min-h-[4rem] mb-4">{info.text}</p>
                
                <div className="pt-4 border-t border-slate-800/80 space-y-4">
                  
                  {/* Guided Tour Toggle */}
                  <button 
                    onClick={toggleGuidedTour} 
                    className={`w-full flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold text-sm transition-all shadow-inner border ${
                      isAutoNarrating 
                      ? 'bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border-rose-500/50' 
                      : 'bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border-emerald-500/30'
                    }`}
                  >
                    {isAutoNarrating ? <StopCircle className="w-5 h-5 animate-pulse" /> : <Film className="w-5 h-5" />}
                    {isAutoNarrating ? "Stop Guided Tour ⏹️" : "Start Guided Tour 🎬🎙️"}
                  </button>

                  <div className="relative">
                    <div className="absolute inset-0 flex items-center" aria-hidden="true">
                      <div className="w-full border-t border-slate-800"></div>
                    </div>
                    <div className="relative flex justify-center">
                      <span className="bg-slate-900 px-2 text-[10px] uppercase text-slate-500 font-bold tracking-widest">OR MANUAL CONTROL</span>
                    </div>
                  </div>

                  {/* Manual Generate Report Button */}
                  <button 
                    onClick={() => generateReport(week, false)} 
                    disabled={isGenerating || isAutoNarrating} 
                    className="w-full flex items-center justify-center gap-2 py-2 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-cyan-400 font-medium text-sm transition-all disabled:opacity-50 shadow-inner"
                  >
                    {isGenerating ? <Loader2 className="w-4 h-4 animate-spin" /> : <Sparkles className="w-4 h-4" />}
                    {isGenerating ? "Analyzing Data..." : mode === 'decomposition' ? "Generate Specific Report ✨" : "Generate Specific Assessment ✨"}
                  </button>

                  {/* Generated Report & TTS */}
                  {report && (
                    <div className="p-4 bg-slate-950/50 rounded-lg border border-slate-800 text-sm text-slate-300 leading-relaxed relative">
                      <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2 text-cyan-500 font-semibold">
                          <FileText className="w-4 h-4" /><span>AI Report</span>
                        </div>
                        <button 
                          onClick={() => narrateReport(report, week, false)} 
                          disabled={isSpeaking}
                          className={`flex items-center gap-1.5 text-xs py-1 px-2.5 rounded border transition-all disabled:opacity-50 ${isSpeaking ? 'bg-rose-500/10 text-rose-400 border-rose-500/30' : 'bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border-cyan-500/30'}`}
                        >
                          {isSpeaking ? <Loader2 className="w-3 h-3 animate-spin" /> : <Volume2 className="w-3 h-3" />}
                          {isSpeaking ? "Speaking..." : "Listen 🔊"}
                        </button>
                      </div>
                      <div className="whitespace-pre-wrap">{report}</div>
                    </div>
                  )}

                  {/* Ask The Expert Section */}
                  <div className="pt-2">
                    <div className="flex items-center gap-2 mb-2 text-slate-300 font-medium text-sm">
                      <MessageCircle className="w-4 h-4 text-purple-400" />
                      Ask the Expert 
                    </div>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        value={customQuestion}
                        onChange={(e) => setCustomQuestion(e.target.value)}
                        placeholder={`Ask about Week ${week}...`}
                        className="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-purple-500/50"
                        onKeyDown={(e) => e.key === 'Enter' && handleAskExpert()}
                      />
                      <button 
                        onClick={handleAskExpert}
                        disabled={isAsking || !customQuestion.trim()}
                        className="bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 text-purple-400 p-2 rounded-lg transition-all disabled:opacity-50"
                      >
                        {isAsking ? <Loader2 className="w-4 h-4 animate-spin" /> : <Send className="w-4 h-4" />}
                      </button>
                    </div>
                    {customAnswer && (
                      <div className="mt-3 p-3 bg-purple-900/10 border border-purple-500/20 rounded-lg text-sm text-slate-300 leading-relaxed">
                        <span className="text-purple-400 font-semibold mr-2">A:</span>{customAnswer}
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {mode === 'decomposition' && activeScenario.necro && (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl">
                  <div className="flex items-center gap-2 mb-4">
                    <Bug className="w-5 h-5 text-lime-400" />
                    <h3 className="font-semibold text-slate-200">Active Necrobiome Agents</h3>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {activeScenario.necro(week).map((agent, i) => (
                      <div key={i} className="flex items-center gap-3 bg-slate-950/50 border border-slate-800/80 rounded-lg p-3 hover:border-lime-500/30 transition-colors">
                        <div className="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-slate-900/80 rounded-md border border-slate-700/80 text-xl shadow-inner select-none">
                          {agent.emoji}
                        </div>
                        <div>
                          <span className="block text-sm font-bold text-lime-400 mb-0.5">{agent.name}</span>
                          <span className="block text-xs text-slate-400 leading-tight">{agent.desc}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="grid grid-cols-1 gap-3">
                {activeScenario.systems.map((system) => {
                  const value = interpolate(week, system.keyframes);
                  const getColorClass = (val) => { if (val > 80) return 'bg-cyan-400'; if (val > 50) return 'bg-yellow-400'; if (val > 20) return 'bg-orange-500'; return 'bg-red-500'; };
                  const getTextColorClass = (val) => { if (val > 80) return 'text-cyan-400'; if (val > 50) return 'text-yellow-400'; if (val > 20) return 'text-orange-500'; return 'text-red-500'; };

                  return (
                    <div key={system.id} className="bg-slate-900/80 border border-slate-800/80 rounded-xl p-4 shadow-sm hover:border-slate-700 transition-colors">
                      <div className="flex justify-between items-center mb-3">
                        <div className="flex items-center gap-3">
                          <div className={`p-2 rounded-lg bg-slate-950 border border-slate-800 shadow-inner`}>
                            <system.icon className={`w-4 h-4 ${getTextColorClass(value)} transition-colors duration-500`} />
                          </div>
                          <span className="font-medium text-slate-200 text-sm">{system.name}</span>
                        </div>
                        <span className={`text-lg font-bold tracking-tight ${getTextColorClass(value)} transition-colors duration-500`}>
                          {Math.round(value)}%
                        </span>
                      </div>
                      <div className="w-full bg-slate-950/50 h-2.5 rounded-full overflow-hidden border border-slate-800/50 mb-2">
                        <div className={`h-full ${getColorClass(value)} transition-all duration-700 ease-out`} style={{ width: `${value}%` }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </main>
          
          <footer className="mt-12 text-center text-xs text-slate-600 max-w-2xl pb-8">
            <p>Values represent generalized approximations of biological integrity and function over a {maxW === 52 ? '52-week' : `${maxW}-week (20-year)`} timeline. Actual deterioration varies wildly based on environmental conditions, temperature, starting health, and genetics.</p>
          </footer>
        </div>
      );
    }

    // --- Render App ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
